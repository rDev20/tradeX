name: Deploy VM

on:
  push:
    branches: [develop]
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]
  workflow_dispatch:
    inputs:
      target_env:
        description: "Environment to deploy"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production

concurrency:
  group: deploy-vm-${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || github.ref_name || inputs.target_env }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy demo to VM
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push' ||
      github.event.workflow_run.conclusion == 'success'
    env:
      VM_HOST: ${{ secrets.VM_HOST }}
      VM_USER: ${{ secrets.VM_USER }}
      VM_PORT: ${{ secrets.VM_PORT || '22' }}
      VM_SSH_PRIVATE_KEY: ${{ secrets.VM_SSH_PRIVATE_KEY }}
      PROD_DEPLOY_DIR: ${{ secrets.VM_DEPLOY_DIR || '/opt/tradex' }}
      PROD_SUBDOMAIN: ${{ secrets.VM_SUBDOMAIN || '103-240-24-3.nip.io' }}
      STAGING_DEPLOY_DIR: ${{ secrets.STAGING_DEPLOY_DIR || '/opt/tradex-staging' }}
      STAGING_SUBDOMAIN: ${{ secrets.STAGING_SUBDOMAIN || 'staging.103-240-24-3.nip.io' }}
    steps:
      - name: Resolve deployment target
        id: target
        env:
          EVENT_NAME: ${{ github.event_name }}
          WORKFLOW_BRANCH: ${{ github.event.workflow_run.head_branch }}
          REF_NAME: ${{ github.ref_name }}
          INPUT_TARGET_ENV: ${{ inputs.target_env }}
        run: |
          if [ "$EVENT_NAME" = "push" ]; then
            target_env="staging"
          elif [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            target_env="$INPUT_TARGET_ENV"
          elif [ "$WORKFLOW_BRANCH" = "main" ]; then
            target_env="production"
          else
            target_env="staging"
          fi

          if [ "$target_env" = "production" ]; then
            {
              echo "environment=production"
              echo "app_name=tradex"
              echo "deploy_dir=$PROD_DEPLOY_DIR"
              echo "subdomain=$PROD_SUBDOMAIN"
              echo "port=3000"
              echo "start_worker=1"
              echo "source_app_dir="
            } >> "$GITHUB_OUTPUT"
          else
            {
              echo "environment=staging"
              echo "app_name=tradex-staging"
              echo "deploy_dir=$STAGING_DEPLOY_DIR"
              echo "subdomain=$STAGING_SUBDOMAIN"
              echo "port=3001"
              echo "start_worker=0"
              echo "source_app_dir=$PROD_DEPLOY_DIR"
            } >> "$GITHUB_OUTPUT"
          fi

          if [ "$EVENT_NAME" = "workflow_dispatch" ] && [ "$target_env" = "production" ] && [ "$REF_NAME" != "main" ]; then
            echo "Manual production deploys must be run from the main branch."
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Validate required secrets
        run: |
          test -n "$VM_HOST" || (echo "Missing VM_HOST secret" && exit 1)
          test -n "$VM_USER" || (echo "Missing VM_USER secret" && exit 1)
          test -n "$VM_SSH_PRIVATE_KEY" || (echo "Missing VM_SSH_PRIVATE_KEY secret" && exit 1)

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$VM_SSH_PRIVATE_KEY" > ~/.ssh/tradex_vm_key
          chmod 600 ~/.ssh/tradex_vm_key
          ssh-keyscan -p "$VM_PORT" -H "$VM_HOST" >> ~/.ssh/known_hosts

      - name: Prepare VM directory
        env:
          DEPLOY_DIR: ${{ steps.target.outputs.deploy_dir }}
        run: |
          ssh -i ~/.ssh/tradex_vm_key -p "$VM_PORT" "$VM_USER@$VM_HOST" \
            "sudo mkdir -p '$DEPLOY_DIR' && sudo chown -R '$VM_USER:$VM_USER' '$DEPLOY_DIR'"

      - name: Create remote safety snapshot
        env:
          APP_NAME: ${{ steps.target.outputs.app_name }}
          DEPLOY_DIR: ${{ steps.target.outputs.deploy_dir }}
        run: |
          SNAPSHOT="${APP_NAME}-demo-code-$(date -u +%Y%m%dT%H%M%SZ).tgz"
          ssh -i ~/.ssh/tradex_vm_key -p "$VM_PORT" "$VM_USER@$VM_HOST" "
            sudo mkdir -p '$DEPLOY_DIR/backups' &&
            if [ -d '$DEPLOY_DIR/demo' ]; then
              sudo tar -C '$DEPLOY_DIR' \
                --exclude='demo/.env' \
                --exclude='demo/web/.env' \
                --exclude='demo/demo.db' \
                --exclude='demo/demo.db-shm' \
                --exclude='demo/demo.db-wal' \
                --exclude='demo/web/node_modules' \
                --exclude='demo/web/.next' \
                --exclude='demo/worker/.venv' \
                --exclude='demo/worker/__pycache__' \
                --exclude='demo/worker/sessions' \
                --exclude='demo/qa/node_modules' \
                --exclude='*.pyc' \
                --exclude='*.log' \
                -czf '$DEPLOY_DIR/backups/$SNAPSHOT' demo &&
              sudo chown '$VM_USER:$VM_USER' '$DEPLOY_DIR/backups/$SNAPSHOT';
            fi"

      - name: Sync demo code
        env:
          DEPLOY_DIR: ${{ steps.target.outputs.deploy_dir }}
        run: |
          rsync -az --delete \
            --exclude '.git' \
            --exclude 'node_modules' \
            --exclude '.next' \
            --exclude '.venv' \
            --exclude '__pycache__' \
            --exclude 'worker/sessions/' \
            --exclude '*.pyc' \
            --exclude 'demo.db' \
            --exclude 'demo.db-journal' \
            --exclude 'demo.db-shm' \
            --exclude 'demo.db-wal' \
            --exclude 'sessions/*.session' \
            --exclude 'sessions/*.session-journal' \
            --exclude '*.log' \
            --exclude '.env' \
            --exclude '.env.local' \
            -e "ssh -i ~/.ssh/tradex_vm_key -p $VM_PORT" \
            demo/ "$VM_USER@$VM_HOST:$DEPLOY_DIR/demo/"

      - name: Deploy on VM
        env:
          APP_NAME: ${{ steps.target.outputs.app_name }}
          DEPLOY_DIR: ${{ steps.target.outputs.deploy_dir }}
          SUBDOMAIN: ${{ steps.target.outputs.subdomain }}
          PORT: ${{ steps.target.outputs.port }}
          START_WORKER: ${{ steps.target.outputs.start_worker }}
          SOURCE_APP_DIR: ${{ steps.target.outputs.source_app_dir }}
        run: |
          ssh -i ~/.ssh/tradex_vm_key -p "$VM_PORT" "$VM_USER@$VM_HOST" \
            "sudo APP_NAME='$APP_NAME' APP_DIR='$DEPLOY_DIR' SUBDOMAIN='$SUBDOMAIN' PORT='$PORT' START_WORKER='$START_WORKER' SOURCE_APP_DIR='$SOURCE_APP_DIR' bash '$DEPLOY_DIR/demo/infra/deploy.sh'"

      - name: Smoke check public URL
        env:
          SUBDOMAIN: ${{ steps.target.outputs.subdomain }}
        run: |
          curl --fail --location --max-time 30 "https://$SUBDOMAIN/login" >/dev/null
